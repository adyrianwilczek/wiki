<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AdiśWiki</title>
<style>
body { font-family: Arial; margin:0; background:#f8f9fa; color:#000; transition: background 0.3s, color 0.3s; }
header { background:#3366cc; color:white; padding:10px; text-align:center; display:flex; justify-content: space-between; align-items: center; }
#app { padding:20px; }
input, textarea { width:100%; margin-bottom:10px; padding:6px; font-size:14px; }
textarea { height:150px; }
button { padding:6px 10px; margin:3px; cursor:pointer; }
.article { background:white; padding:10px; margin-top:10px; border:1px solid #ccc; position:relative; transition: background 0.3s, color 0.3s; }
.delete-btn { position:absolute; right:10px; top:10px; background:red; color:white; border:none; cursor:pointer; }
#admin-panel { background:#e2e2e2; padding:10px; margin-bottom:20px; transition: background 0.3s; }
/* Tryb ciemny */
body.dark { background:#121212; color:#f1f1f1; }
body.dark .article { background:#1e1e1e; color:#f1f1f1; border:1px solid #333; }
body.dark #admin-panel { background:#1e1e1e; color:#f1f1f1; }
body.dark input, body.dark textarea { background:#2b2b2b; color:#f1f1f1; border:1px solid #444; }
</style>
</head>
<body>

<header>
<h2>AdiśWiki</h2>
<button onclick="toggleTheme()">🌙 Tryb ciemny/jasny</button>
</header>

<div id="app">

<div id="admin-panel">
<h3>Panel Admina</h3>
<input type="password" id="admin-password" placeholder="Hasło admina">
<button onclick="loginAdmin()">Zaloguj</button>
<span id="admin-status" style="margin-left:10px; font-weight:bold;"></span>
</div>

<h3>Nowy artykuł</h3>
<input id="title" placeholder="Tytuł artykułu">
<textarea id="text" placeholder="Treść artykułu..."></textarea>
<button onclick="addArticle()">Dodaj artykuł</button>

<h3>Szukaj artykułu</h3>
<input id="search" placeholder="Wpisz tytuł..." oninput="renderArticles()">

<h3>Artykuły</h3>
<div id="articles"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-firestore.js";

// ===== Firebase config =====
const firebaseConfig = {
   apiKey: "AIzaSyAPGTGGXaG2k8rDWKcGW2kJTqi9YuwOEdM",
  authDomain: "adiswiki-7a829.firebaseapp.com",
  projectId: "adiswiki-7a829",
  storageBucket: "adiswiki-7a829.firebasestorage.app",
  messagingSenderId: "578408626245",
  appId: "1:578408626245:web:c45716730030e7c3574b2c",
  measurementId: "G-SRPH0EREFC"
};

// ===== Initialize Firebase =====
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const articlesCol = collection(db, "articles");

const ADMIN_PASSWORD = "Adminpanel48";
let isAdmin = false;
let articles = [];

// ===== Tryb ciemny/jasny =====
function toggleTheme(){ document.body.classList.toggle("dark"); }

// ===== Renderowanie artykułów =====
function renderArticles(){
  const container = document.getElementById("articles");
  container.innerHTML = "";
  const queryText = document.getElementById("search")?.value.toLowerCase() || "";

  articles
    .filter(a => a.title.toLowerCase().includes(queryText))
    .forEach(a=>{
      let div = document.createElement("div");
      div.className = "article";
      div.innerHTML = `<h3>${a.title}</h3><p>${a.text.replace(/\n/g,"<br>")}</p>`;
      if(isAdmin){
        let btn = document.createElement("button");
        btn.className="delete-btn";
        btn.textContent="Usuń";
        btn.onclick = async ()=>{
          await deleteDoc(doc(db, "articles", a.id));
        };
        div.appendChild(btn);
      }
      container.appendChild(div);
    });
}

// ===== Dodawanie artykułu =====
async function addArticle(){
  const title = document.getElementById("title").value.trim();
  const text = document.getElementById("text").value.trim();
  if(!title || !text){ alert("Uzupełnij pola!"); return; }
  try {
    await addDoc(articlesCol, { title, text, timestamp: Date.now() });
    document.getElementById("title").value="";
    document.getElementById("text").value="";
  } catch(e){ console.error("Błąd dodawania artykułu:", e); }
}

// ===== Panel admina =====
function loginAdmin(){
  const pass = document.getElementById("admin-password").value;
  if(pass===ADMIN_PASSWORD){
    isAdmin=true;
    document.getElementById("admin-status").textContent="Zalogowany jako admin ✅";
    renderArticles();
  } else {
    alert("Błędne hasło!");
  }
}

// ===== Nasłuchiwanie zmian Firestore live =====
const q = query(articlesCol, orderBy("timestamp","desc"));
onSnapshot(q, snapshot=>{
  articles = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  renderArticles();
});

</script>

</body>
</html>
